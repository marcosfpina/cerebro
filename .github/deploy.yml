name: Optional Cloud Run Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Optional Cloud Run
    runs-on: self-hosted
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - uses: actions/checkout@v4

      # Optional vendor-specific deployment path for teams using GCP/Cloud Run.
      # This requires configuring Workload Identity Federation.
      # See: https://github.com/google-github-actions/auth
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      # Since we are using Nix, we might want to build a Docker image with Nix
      # or just use a standard Python runtime. For simplicity here, we assume
      # a standard Python build or a Dockerfile (which we should verify/create).

      # Deploy from source when the optional Cloud Run path is explicitly triggered.
      - name: 'Deploy to Cloud Run'
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: 'phantom-cerebro'
          region: '${{ vars.GCP_REGION || "us-central1" }}'
          source: '.'
          env_vars: |
            GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID || vars.GOOGLE_CLOUD_PROJECT_ID }}
            GOOGLE_CLOUD_PROJECT_ID=${{ vars.GCP_PROJECT_ID || vars.GOOGLE_CLOUD_PROJECT_ID }}
            DATA_STORE_ID=${{ vars.DATA_STORE_ID }}

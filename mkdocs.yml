site_name: Cerebro
site_description: Enterprise Knowledge Extraction Platform
site_author: voidnxlabs
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/gitlab

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: README.md
  - Getting Started:
    - Quick Start: guides/QUICK_START.md
    - Cheatsheet: guides/CHEATSHEET.md
    - Keyboard Shortcuts: guides/KEYBOARD_SHORTCUTS.md
    - Knowledge Base Quickstart: guides/QUICKSTART_KB.md
  - Architecture:
    - Overview: architecture/ARCHITECTURE.md
    - Data Flow: architecture/ARCHITECTURE_DATA_FLOW.md
    - ADR Summary: architecture/ADR_SUMMARY.md
    - Phoenix Architecture Report: architecture/PHOENIX_ARCHITECTURE_REPORT.md
  - Commands:
    - Overview: commands/README.md
    - cerebro info: commands/cerebro_info.md
    - cerebro version: commands/cerebro_version.md
    - cerebro rag query: commands/cerebro_rag_query.md
    - cerebro knowledge analyze: commands/cerebro_knowledge_analyze.md
    - cerebro knowledge batch-analyze: commands/cerebro_knowledge_batch-analyze.md
    - cerebro knowledge summarize: commands/cerebro_knowledge_summarize.md
    - cerebro ops health: commands/cerebro_ops_health.md
  - Features:
